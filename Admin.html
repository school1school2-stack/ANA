<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة بناء الاختبارات | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; padding: 20px; direction: rtl; }
        .admin-box { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section-header { background: #1e3a8a; color: white; padding: 10px 20px; border-radius: 8px; margin-top: 25px; display: flex; justify-content: space-between; }
        .q-row { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; margin-top: 10px; border-radius: 8px; border-right: 5px solid #3b82f6; }
        select, input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Cairo'; box-sizing: border-box; }
        .yellow-box { background: #fffde7 !important; border: 2px dashed #fbc02d !important; }
        .btn-gen { background: #10b981; color: white; padding: 20px; width: 100%; border: none; border-radius: 10px; font-size: 1.3em; cursor: pointer; font-weight: bold; margin-top: 30px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; background: #eef2f7; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="text-align: center; color: #1e3a8a;">⚙️ صانع الاختبارات المتنوعة (42 سؤالاً)</h2>
    <input type="text" id="testTitle" placeholder="أدخل عنوان الاختبار هنا..." style="font-size: 1.4em; border-bottom: 3px solid #1e3a8a;">
    
    <div id="mainEditor"></div>

    <button class="btn-gen" onclick="generateLink()">🔗 توليد رابط الاختبار النهائي</button>
    
    <div id="resultArea" style="display:none; margin-top:30px; padding: 20px; background: #e0f2f1; border-radius: 10px;">
        <p><b>الرابط جاهز! انسخه وأرسله لطلابك:</b></p>
        <textarea id="finalUrl" style="height:100px; color: #1e3a8a;" readonly></textarea>
        <button class="btn-gen" style="background:#00796b; padding:10px; font-size:1em;" onclick="copyUrl()">نسخ الرابط</button>
    </div>
</div>

<script>
    const types = [
        {id: 1, name: "مثّل في جملة مفيدة"},
        {id: 2, name: "أكمل الفراغ"},
        {id: 3, name: "اختر الإجابة الصحيحة (4 خيارات)"},
        {id: 4, name: "أعرب ما تحته خط"},
        {id: 5, name: "صح وخطأ"},
        {id: 6, name: "استخرج من النص (نص + سؤال)"}
    ];

    // توليد الأقسام والأسئلة آلياً
    const editor = document.getElementById('mainEditor');
    for(let s=1; s<=6; s++) {
        let sHtml = `<div class="section-header"><span>القسم ${s}</span><span>7 أسئلة</span></div><div id="sec${s}">`;
        for(let q=1; q<=7; q++) {
            let idx = ((s-1)*7) + q;
            sHtml += `
                <div class="q-row" id="qRow${idx}">
                    <b>سؤال ${idx}:</b>
                    <select onchange="changeType(${idx})" id="type${idx}">
                        ${types.map(t => `<option value="${t.id}" ${t.id === s ? 'selected' : ''}>${t.name}</option>`).join('')}
                    </select>
                    <div id="ui${idx}"></div>
                </div>`;
        }
        editor.innerHTML += sHtml + `</div>`;
    }

    // تشغيل الـ UI لأول مرة
    for(let i=1; i<=42; i++) changeType(i);

    function changeType(idx) {
        const type = document.getElementById('type'+idx).value;
        const box = document.getElementById('ui'+idx);
        let html = ``;

        if(type == "6") html += `<textarea placeholder="ضع النص هنا (سيظهر للطالب في مربع أصفر)" class="q-passage yellow-box"></textarea>`;
        
        html += `<input type="text" placeholder="نص السؤال" class="q-text">`;

        if(type == "3") {
            html += `<div class="opt-grid">
                <input type="text" placeholder="خيار 1" class="o1"><input type="text" placeholder="خيار 2" class="o2">
                <input type="text" placeholder="خيار 3" class="o3"><input type="text" placeholder="خيار 4" class="o4">
            </div>`;
        }

        html += `<input type="text" placeholder="الإجابة الصحيحة" class="q-ans">`;
        html += `<input type="text" placeholder="تلميحة السؤال" class="q-hnt">`;
        box.innerHTML = html;
    }

    function generateLink() {
        const questions = [];
        for(let i=1; i<=42; i++) {
            const row = document.getElementById('qRow'+i);
            const type = document.getElementById('type'+i).value;
            let obj = {
                type: type,
                q: row.querySelector('.q-text').value,
                ans: row.querySelector('.q-ans').value,
                hint: row.querySelector('.q-hnt').value
            };
            if(type == "3") obj.opts = [row.querySelector('.o1').value, row.querySelector('.o2').value, row.querySelector('.o3').value, row.querySelector('.o4').value];
            if(type == "5") obj.opts = ["صح", "خطأ"];
            if(type == "6") obj.passage = row.querySelector('.q-passage').value;
            questions.push(obj);
        }
        const data = { title: document.getElementById('testTitle').value || "اختبار كفايات", questions: questions };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const baseUrl = window.location.href.replace('Admin.html', 'Student.html');
        document.getElementById('finalUrl').value = baseUrl + "?data=" + encoded;
        document.getElementById('resultArea').style.display = 'block';
    }

    function copyUrl() {
        document.getElementById("finalUrl").select();
        document.execCommand("copy");
        alert("تم نسخ الرابط بنجاح!");
    }
</script>
</body>
</html>
