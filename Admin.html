<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي | ثانوية الأمير عبدالمجيد 😇</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; direction: rtl; }
        .header { background: white; padding: 15px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .teacher-box { background: #f1f5f9; padding: 8px 15px; border-radius: 12px; font-weight: 900; color: var(--primary); border: 1px solid #cbd5e1; }
        .main-content { padding: 15px; max-width: 850px; margin: auto; }
        #testsManager { display: none; background: #e2e8f0; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--primary); }
        .test-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .q-card { background: white; border-radius: 15px; margin-bottom: 15px; border-right: 8px solid var(--primary); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .q-head { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; font-family: 'Cairo'; box-sizing: border-box; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(30, 58, 138, 0.95); padding: 12px 5px; display: flex; justify-content: center; gap: 8px; z-index: 1000; }
        .bar-btn { flex: 1; max-width: 90px; padding: 10px 5px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        #resultsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .q-menu { display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: white; width: 90%; max-width: 350px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1100; padding: 10px; border: 1px solid #ddd; }
        .menu-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; text-align: center; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1050; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<div class="header">
    <div class="teacher-box">أ. عبدالعزيز الفيفي 😇</div>
    <div style="font-weight: bold; color: var(--primary);">ثانوية الأمير عبدالمجيد</div>
</div>

<div class="main-content">
    <div id="testsManager">
        <h3 style="text-align:center;">📂 النماذج المحفوظة</h3>
        <div id="testsList">جاري التحميل...</div>
    </div>
    <input type="text" id="testTitle" placeholder="أدخل عنوان النموذج (مثلاً: قواعد النحو)" style="font-size: 1.2em; border: 2px solid var(--primary);">
    <div id="questionsContainer"></div>
</div>

<div class="q-menu" id="qMenu">
    <div class="menu-item" onclick="addQuestion(1)">أكمل الفراغ ⚪</div>
    <div class="menu-item" onclick="addQuestion(2)">أعرب ما تحته خط ✏️</div>
    <div class="menu-item" onclick="addQuestion(3)">مثّل في جملة مفيدة 💬</div>
    <div class="menu-item" onclick="addQuestion(6)">اختر الإجابة الصحيحة 🔘</div>
</div>

<div id="resultsModal">
    <button onclick="document.getElementById('resultsModal').style.display='none'" style="background:red; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">إغلاق ×</button>
    <h2 id="resTitle" style="text-align:center;">تحليل النتائج والبيانات</h2>
    <div style="max-width:300px; margin:auto;"><canvas id="statsChart"></canvas></div>
    <table style="width:100%; border-collapse: collapse; margin-top:20px; text-align:center;">
        <thead><tr style="background:var(--primary); color:white;"><th>الطالب</th><th>الفصل</th><th>الدرجة</th><th>تفاصيل</th></tr></thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<div class="bottom-bar">
    <button class="bar-btn" style="background:#3b82f6" onclick="toggleMenu()">➕ سؤال</button>
    <button class="bar-btn" style="background:#8b5cf6" onclick="saveToCloud()">💾 حفظ</button>
    <button class="bar-btn" style="background:#10b981" onclick="openTestsList()">📂 النماذج</button>
    <button class="bar-btn" style="background:#ef4444" onclick="location.reload()">🏠 الرئيسية</button>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT...", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let qCount = 0; let currentTestID = null; let myChart = null;

    function toggleMenu() {
        document.getElementById('qMenu').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeAllPanels() {
        document.getElementById('qMenu').style.display = 'none';
        document.getElementById('testsManager').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function addQuestion(type, data = null) {
        closeAllPanels(); qCount++;
        const html = `
            <div class="q-card" id="qCard${qCount}" data-type="${type}">
                <div class="q-head"><span>س ${qCount}</span><button onclick="this.parentElement.parentElement.remove()" style="background:none; border:none; color:white; cursor:pointer;">×</button></div>
                <div class="q-body">
                    <input type="text" class="q-text" placeholder="نص السؤال" value="${data ? data.q : ''}">
                    <input type="text" class="q-ans" placeholder="الإجابة الصحيحة (للتصحيح الذكي)" value="${data ? data.ans : ''}">
                </div>
            </div>`;
        document.getElementById('questionsContainer').insertAdjacentHTML('beforeend', html);
    }

    function saveToCloud() {
        const title = document.getElementById('testTitle').value;
        const questions = [];
        document.querySelectorAll('.q-card').forEach(card => {
            questions.push({ q: card.querySelector('.q-text').value, ans: card.querySelector('.q-ans').value, type: card.dataset.type });
        });
        if(!title || questions.length === 0) return Swal.fire('تنبيه','أكمل البيانات','warning');
        currentTestID = currentTestID || Date.now();
        database.ref('tests/' + currentTestID).set({ title, questions }).then(() => Swal.fire('تم الحفظ','تم تخزين النموذج بنجاح','success'));
    }

    function openTestsList() {
        document.getElementById('testsManager').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        database.ref('tests').once('value', (s) => {
            const data = s.val(); const list = document.getElementById('testsList'); list.innerHTML = '';
            for(let id in data) {
                list.innerHTML += `
                    <div class="test-item">
                        <span>${data[id].title}</span>
                        <div>
                            <button class="bar-btn" style="background:#10b981; max-width:60px;" onclick="copyLink('${id}')">رابط</button>
                            <button class="bar-btn" style="background:#f59e0b; max-width:60px;" onclick="viewResults('${id}')">نتائج</button>
                        </div>
                    </div>`;
            }
        });
    }

    function copyLink(id) {
        const studentUrl = window.location.href.replace('Admin.html', 'Student.html') + "?id=" + id;
        Swal.fire({ title: 'رابط الطالب', html: `<input id="copyInp" value="${studentUrl}" style="width:100%; text-align:center;">`, confirmButtonText: 'نسخ' }).then(() => {
            document.getElementById('copyInp').select(); document.execCommand('copy');
        });
    }

    function viewResults(testID) {
        document.getElementById('resultsModal').style.display = 'block';
        database.ref('results/' + testID).on('value', (s) => {
            const resData = s.val(); const body = document.getElementById('resultsBody'); body.innerHTML = '';
            let stats = { ممتاز: 0, جيد: 0, ضعيف: 0 };
            for(let key in resData) {
                const res = resData[key];
                const p = (res.score / res.total) * 100;
                if(p >= 85) stats.ممتاز++; else if(p >= 50) stats.جيد++; else stats.ضعيف++;
                body.innerHTML += `<tr><td>${res.name}</td><td>${res.class}</td><td>${res.score}/${res.total}</td><td><button onclick="Swal.fire('التفاصيل','${res.name} حل الاختبار بنجاح','info')">👁️</button></td></tr>`;
            }
            updateChart(stats);
        });
    }

    function updateChart(s) {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['ممتاز', 'جيد', 'ضعيف'], datasets: [{ data: [s.ممتاز, s.جيد, s.ضعيف], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] } });
    }
</script>
</body>
</html>
