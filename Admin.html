<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; }
        .section-group { border: 2px solid #1e3a8a; margin-bottom: 20px; padding: 15px; border-radius: 10px; }
        .q-row { background: #f8fafc; border: 1px solid #ddd; padding: 10px; margin-top: 5px; }
        input { width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; }
        .btn-main { background: #1e3a8a; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="admin-container">
    <h2>🎨 صانع الاختبارات الملونة (42 سؤالاً)</h2>
    <input type="text" id="tTitle" placeholder="عنوان الاختبار">
    <div id="mainEditor"></div>
    <button class="btn-main" onclick="generate()">🔗 توليد رابط الاختبار الملون</button>
    <textarea id="finalUrl" style="width:100%; height:100px; margin-top:20px; display:none;" readonly></textarea>
</div>

<script>
    // توليد خانات الـ 42 سؤالاً آلياً عند الفتح
    const editor = document.getElementById('mainEditor');
    for(let s=1; s<=6; s++) {
        let html = `<div class="section-group"><h3>🌈 القسم ${s}</h3>`;
        for(let q=1; q<=7; q++) {
            html += `<div class="q-row">
                <b>سؤال ${((s-1)*7)+q}:</b>
                <input type="text" class="q-txt" placeholder="نص السؤال">
                <input type="text" class="q-opts" placeholder="الخيارات (افصل بينها بفاصلة ,) أو اتركها فارغة لسؤال كتابة">
                <input type="text" class="q-ans" placeholder="الإجابة الصحيحة">
                <input type="text" class="q-hnt" placeholder="تلميحة">
            </div>`;
        }
        editor.innerHTML += html + `</div>`;
    }

    function generate() {
        const questions = [];
        const rows = document.querySelectorAll('.q-row');
        rows.forEach(row => {
            const opts = row.querySelector('.q-opts').value;
            questions.push({
                q: row.querySelector('.q-txt').value,
                type: opts ? 'radio' : 'text',
                opts: opts ? opts.split(',') : [],
                ans: row.querySelector('.q-ans').value,
                hint: row.querySelector('.q-hnt').value
            });
        });
        const fullData = { title: document.getElementById('tTitle').value, questions: questions };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(fullData))));
        const url = window.location.href.replace('Admin.html', 'Student.html') + "?data=" + encoded;
        document.getElementById('finalUrl').value = url;
        document.getElementById('finalUrl').style.display = 'block';
        alert("تم توليد الرابط بنجاح!");
    }
</script>
</body>
</html>
