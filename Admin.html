<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التصحيح | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .main-container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .test-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* نافذة تصحيح ورقة الطالب */
        #correctionModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 20px; }
        .q-review-box { background: #f8fafc; padding: 15px; border-radius: 12px; border-right: 8px solid #cbd5e1; margin-bottom: 15px; }
        .correct-btn { background: #dcfce7; color: #166534; border: 2px solid #166534; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .wrong-btn { background: #fee2e2; color: #991b1b; border: 2px solid #991b1b; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .active-correct { background: #166534 !important; color: white !important; }
        .active-wrong { background: #991b1b !important; color: white !important; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h2>لوحة تحكم ثانوية الأمير عبدالمجيد 😇</h2>
    <p>مرحباً أ. عبدالعزيز الفيفي</p>
</div>

<div class="main-container" id="testsList">جاري تحميل الاختبارات...</div>

<div id="correctionModal">
    <div style="display:flex; justify-content:space-between; align-items:center; background: var(--primary); color:white; padding:15px; border-radius:15px; position: sticky; top: 0; z-index: 10;">
        <div>
            <h3 id="studentTitle" style="margin:0;">تصحيح ورقة الطالب</h3>
            <b id="liveScore">الدرجة الحالية: 0</b>
        </div>
        <button onclick="saveAndClose()" class="btn" style="background: #10b981;">✅ اعتماد الدرجة وحفظ</button>
    </div>
    <div id="questionsReview" style="margin-top:20px;"></div>
</div>

<script>
    // بيانات Firebase Youy-apps
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT-10c85ef0c93b79596620fd", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentTestID = '';
    let currentResultID = '';
    let currentDetails = [];

    // تحميل الاختبارات
    database.ref('tests').on('value', (s) => {
        const data = s.val();
        const container = document.getElementById('testsList');
        container.innerHTML = '';
        for (let id in data) {
            container.innerHTML += `
                <div class="test-card">
                    <b>${data[id].title}</b>
                    <button onclick="showResultsTable('${id}')" class="btn" style="background:var(--accent)">نتائج الطلاب</button>
                </div>`;
        }
    });

    function showResultsTable(testID) {
        currentTestID = testID;
        database.ref('results/' + testID).once('value', (s) => {
            const data = s.val();
            let html = '<table style="width:100%"><tr><th>الطالب</th><th>الدرجة</th><th>إجراء</th></tr>';
            for (let id in data) {
                html += `<tr><td>${data[id].name}</td><td>${data[id].approvedScore || data[id].score} / ${data[id].total}</td>
                <td><button onclick="openCorrection('${id}')" class="btn" style="background:orange">فتح للتصحيح</button></td></tr>`;
            }
            html += '</table>';
            Swal.fire({ title: 'نتائج الطلاب', html: html, width: '90%', showConfirmButton: false });
        });
    }

    function openCorrection(resID) {
        currentResultID = resID;
        database.ref('results/' + currentTestID + '/' + resID).once('value', (s) => {
            const res = s.val();
            currentDetails = res.details;
            document.getElementById('studentTitle').innerText = "طالب: " + res.name;
            const container = document.getElementById('questionsReview');
            container.innerHTML = '';
            
            currentDetails.forEach((d, index) => {
                container.innerHTML += `
                    <div class="q-review-box" id="qBox_${index}">
                        <b>س${index+1}: ${d.question}</b><br>
                        <p style="background:white; padding:10px; border-radius:8px; border:1px solid #ddd;">إجابة الطالب: <span style="color:blue">${d.userAnswer || 'لا يوجد'}</span></p>
                        <div style="display:flex; gap:10px;">
                            <button id="btnC_${index}" class="correct-btn ${d.status?'active-correct':''}" onclick="setQStatus(${index}, true)">✅ صح</button>
                            <button id="btnW_${index}" class="wrong-btn ${!d.status?'active-wrong':''}" onclick="setQStatus(${index}, false)">❌ خطأ</button>
                        </div>
                    </div>`;
            });
            updateLiveScore();
            document.getElementById('correctionModal').style.display = 'block';
            Swal.close();
        });
    }

    function setQStatus(index, status) {
        currentDetails[index].status = status;
        document.getElementById(`btnC_${index}`).className = status ? 'correct-btn active-correct' : 'correct-btn';
        document.getElementById(`btnW_${index}`).className = !status ? 'wrong-btn active-wrong' : 'wrong-btn';
        updateLiveScore();
    }

    function updateLiveScore() {
        const score = currentDetails.filter(d => d.status).length;
        document.getElementById('liveScore').innerText = `الدرجة الحالية: ${score} من ${currentDetails.length}`;
    }

    function saveAndClose() {
        const finalScore = currentDetails.filter(d => d.status).length;
        database.ref('results/' + currentTestID + '/' + currentResultID).update({
            details: currentDetails,
            approvedScore: finalScore
        }).then(() => {
            document.getElementById('correctionModal').style.display = 'none';
            Swal.fire('تم الاعتماد', 'تم تعديل درجة الطالب بناءً على تصحيحك', 'success');
        });
    }
</script>
</body>
</html>
