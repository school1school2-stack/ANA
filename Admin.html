<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأستاذ عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; padding: 20px; direction: rtl; }
        .admin-box { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section-card { border: 2px solid #1e3a8a; margin-bottom: 30px; padding: 20px; border-radius: 12px; background: #fff; }
        .q-row { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; margin-top: 10px; border-radius: 8px; position: relative; }
        select, input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Cairo'; box-sizing: border-box; }
        .text-area-yellow { background: #fff9c4 !important; border: 1px dashed #fbc02d; }
        .btn-gen { background: #10b981; color: white; padding: 20px; width: 100%; border: none; border-radius: 10px; font-size: 1.3em; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .q-header { display: flex; justify-content: space-between; align-items: center; background: #1e3a8a; color: white; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>⚙️ منصة بناء الاختبارات الاحترافية</h2>
    <input type="text" id="testTitle" placeholder="أدخل عنوان الاختبار هنا..." style="font-size: 1.5em; font-weight: bold; color: #1e3a8a;">
    
    <div id="sectionsContainer"></div>

    <button class="btn-gen" onclick="generateFinalLink()">🔗 توليد رابط الاختبار للطلاب</button>
    
    <div id="resultArea" style="display:none; margin-top:30px;">
        <p><b>انسخ الرابط التالي وأرسله لطلابك:</b></p>
        <textarea id="finalUrl" style="height:100px; background: #eef;" readonly></textarea>
    </div>
</div>

<script>
    const container = document.getElementById('sectionsContainer');
    const types = [
        {id: 1, name: "مثّل في جملة مفيدة"},
        {id: 2, name: "أكمل الفراغ"},
        {id: 3, name: "اختر الإجابة الصحيحة (4 خيارات)"},
        {id: 4, name: "أعرب ما تحته خط"},
        {id: 5, name: "صح وخطأ"},
        {id: 6, name: "استخرج من النص"}
    ];

    // بناء الـ 6 أقسام تلقائياً
    for(let s=1; s<=6; s++) {
        let sectionHtml = `
            <div class="section-card" id="sec${s}">
                <div class="q-header"><span>القسم ${s}</span> <span>7 أسئلة</span></div>
                <div id="qList${s}"></div>
            </div>`;
        container.insertAdjacentHTML('beforeend', sectionHtml);
        
        for(let q=1; q<=7; q++) {
            let qIdx = ((s-1)*7) + q;
            let qHtml = `
                <div class="q-row" id="qRow${qIdx}">
                    <b>سؤال ${qIdx}:</b>
                    <select onchange="updateQTemplate(${qIdx})" id="type${qIdx}">
                        ${types.map(t => `<option value="${t.id}" ${t.id === s ? 'selected' : ''}>${t.name}</option>`).join('')}
                    </select>
                    <div id="fields${qIdx}"></div>
                </div>`;
            document.getElementById('qList'+s).insertAdjacentHTML('beforeend', qHtml);
            updateQTemplate(qIdx);
        }
    }

    function updateQTemplate(idx) {
        const type = document.getElementById('type'+idx).value;
        const fieldBox = document.getElementById('fields'+idx);
        let html = `<input type="text" placeholder="نص السؤال" class="q-text">`;
        
        if(type == "3") { // خيارات
            html += `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <input type="text" placeholder="خيار أ" class="opt1">
                    <input type="text" placeholder="خيار ب" class="opt2">
                    <input type="text" placeholder="خيار ج" class="opt3">
                    <input type="text" placeholder="خيار د" class="opt4">
                </div>`;
        } else if(type == "6") { // استخراج من نص
            html = `<textarea placeholder="ضع النص هنا (سيظهر للطالب باللون الأصفر)" class="q-passage text-area-yellow"></textarea>` + html;
        } else if(type == "5") { // صح وخطأ
             html += `<p style="font-size:12px; color:blue;">* سيظهر للطالب خياري (صح / خطأ) تلقائياً</p>`;
        }
        
        html += `<input type="text" placeholder="الإجابة الصحيحة" class="q-ans">`;
        html += `<input type="text" placeholder="التلميحة (اختياري)" class="q-hnt">`;
        fieldBox.innerHTML = html;
    }

    function generateFinalLink() {
        const questions = [];
        for(let i=1; i<=42; i++) {
            const row = document.getElementById('qRow'+i);
            const type = document.getElementById('type'+i).value;
            let obj = {
                type: type,
                q: row.querySelector('.q-text').value,
                ans: row.querySelector('.q-ans').value,
                hint: row.querySelector('.q-hnt').value
            };
            if(type == "3") {
                obj.opts = [row.querySelector('.opt1').value, row.querySelector('.opt2').value, row.querySelector('.opt3').value, row.querySelector('.opt4').value];
            } else if(type == "6") {
                obj.passage = row.querySelector('.q-passage').value;
            } else if(type == "5") {
                obj.opts = ["صح", "خطأ"];
            }
            questions.push(obj);
        }
        
        const data = { title: document.getElementById('testTitle').value || "اختبار كفايات", questions: questions };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const baseUrl = window.location.href.replace('Admin.html', 'Student.html');
        document.getElementById('finalUrl').value = baseUrl + "?data=" + encoded;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
