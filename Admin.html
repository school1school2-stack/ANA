<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; padding: 20px; direction: rtl; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .question-card { background: #fff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative; border-right: 8px solid #1e3a8a; }
        select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e1; font-family: 'Cairo'; box-sizing: border-box; }
        .passage-input { background: #fff9c4 !important; border: 2px dashed #fbc02d !important; }
        .btn-add { background: #1e3a8a; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px 0; }
        .btn-generate { background: #10b981; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-size: 1.2em; cursor: pointer; font-weight: 700; margin-top: 30px; }
        .del-q { position: absolute; left: 15px; top: 15px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .options-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2 style="text-align:center; color:#1e3a8a;">🏗️ صانع الاختبارات المرن والذكي</h2>
    <input type="text" id="testTitle" placeholder="أدخل عنوان الاختبار (مثلاً: كفايات الهمزة)" style="font-size: 1.4em; border-bottom: 3px solid #1e3a8a;">
    
    <div id="questionsWrapper"></div>

    <button class="btn-add" onclick="createQuestion()">➕ إضافة سؤال جديد</button>
    
    <button class="btn-generate" onclick="generateLink()">🔗 توليد رابط الاختبار للطلاب</button>
    
    <div id="linkResult" style="display:none; margin-top:30px; padding: 20px; background: #e0f2f1; border-radius: 15px;">
        <p><b>انسخ الرابط وأرسله لطلابك:</b></p>
        <textarea id="outputUrl" style="height:100px; color: #1e3a8a;" readonly></textarea>
        <button class="btn-add" style="background:#00796b; width:100%" onclick="copyLink()">نسخ الرابط</button>
    </div>
</div>

<script>
    let qID = 0;
    const qTypes = [
        {v: 1, n: "أكمل الفراغ"},
        {v: 2, n: "أعرب ما تحته خط"},
        {v: 3, n: "مثّل في جملة مفيدة"},
        {v: 4, n: "استخرج من النص"},
        {v: 5, n: "صح وخطأ"},
        {v: 6, n: "اختر الإجابة الصحيحة"}
    ];

    function createQuestion() {
        qID++;
        const html = `
            <div class="question-card" id="card${qID}">
                <button class="del-q" onclick="removeCard(${qID})">×</button>
                <b>السؤال رقم ${qID}:</b>
                <select onchange="renderUI(${qID})" id="sel${qID}">
                    ${qTypes.map(t => `<option value="${t.v}">${t.n}</option>`).join('')}
                </select>
                <div id="ui${qID}"></div>
            </div>`;
        document.getElementById('questionsWrapper').insertAdjacentHTML('beforeend', html);
        renderUI(qID);
    }

    function removeCard(id) { document.getElementById('card'+id).remove(); }

    function renderUI(id) {
        const type = document.getElementById('sel'+id).value;
        const box = document.getElementById('ui'+id);
        let content = ``;
        if(type == "4") content += `<textarea placeholder="ضع النص هنا..." class="q-passage passage-input"></textarea>`;
        content += `<input type="text" placeholder="نص السؤال" class="q-text">`;
        if(type == "6") {
            content += `<div class="options-box">
                <input type="text" placeholder="خيار 1" class="o1"><input type="text" placeholder="خيار 2" class="o2">
                <input type="text" placeholder="خيار 3" class="o3"><input type="text" placeholder="خيار 4" class="o4">
            </div>`;
        }
        content += `<input type="text" placeholder="الإجابة الصحيحة (للتصحيح الذكي)" class="q-ans">`;
        content += `<input type="text" placeholder="تلميحة السؤال" class="q-hnt">`;
        box.innerHTML = content;
    }

    function generateLink() {
        const questions = [];
        document.querySelectorAll('.question-card').forEach((card) => {
            const id = card.id.replace('card', '');
            const type = document.getElementById('sel'+id).value;
            let obj = {
                type: type,
                q: card.querySelector('.q-text').value,
                ans: card.querySelector('.q-ans').value,
                hint: card.querySelector('.q-hnt').value
            };
            if(type == "6") obj.opts = [card.querySelector('.o1').value, card.querySelector('.o2').value, card.querySelector('.o3').value, card.querySelector('.o4').value];
            if(type == "5") obj.opts = ["صح", "خطأ"];
            if(type == "4") obj.passage = card.querySelector('.q-passage').value;
            questions.push(obj);
        });

        const data = btoa(unescape(encodeURIComponent(JSON.stringify({ title: document.getElementById('testTitle').value, questions: questions }))));
        const baseUrl = window.location.href.replace('Admin.html', 'Student.html');
        document.getElementById('outputUrl').value = baseUrl + "?data=" + data;
        document.getElementById('linkResult').style.display = 'block';
    }

    function copyLink() {
        document.getElementById("outputUrl").select();
        document.execCommand("copy");
        alert("تم نسخ الرابط!");
    }
</script>
</body>
</html>
