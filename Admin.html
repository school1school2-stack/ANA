<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; padding: 20px; direction: rtl; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-row { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #fafafa; }
        select, input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; font-family: 'Cairo'; }
        .btn { background: #1e3a8a; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; }
        .yellow { background: #fffde7; }
    </style>
</head>
<body>
<div class="box">
    <h2 style="color:#1e3a8a">🛠️ صانع الاختبارات الذكية (42 سؤالاً)</h2>
    <input type="text" id="testTitle" placeholder="عنوان الاختبار">
    <div id="editor"></div>
    <button class="btn" onclick="generate()">🔗 توليد رابط الاختبار الذكي للطلاب</button>
    <div id="res" style="display:none; margin-top:20px;">
        <p>انسخ هذا الرابط وأرسله لطلابك:</p>
        <textarea id="link" style="height:80px;" readonly></textarea>
    </div>
</div>

<script>
    const types = ["مثّل في جملة", "أكمل الفراغ", "اختر الإجابة", "أعرب ما تحته خط", "صح وخطأ", "استخرج من النص"];
    const editor = document.getElementById('editor');

    for(let s=1; s<=6; s++) {
        editor.innerHTML += `<h3 style="background:#1e3a8a; color:white; padding:5px 15px; border-radius:5px;">القسم ${s}: ${types[s-1]}</h3>`;
        for(let q=1; q<=7; q++) {
            let idx = ((s-1)*7) + q;
            editor.innerHTML += `
                <div class="q-row" id="row${idx}">
                    <b>سؤال ${idx}:</b>
                    <select id="type${idx}" onchange="updateUI(${idx})">
                        ${types.map((t,i) => `<option value="${i+1}" ${s==i+1?'selected':''}>${t}</option>`).join('')}
                    </select>
                    <div id="ui${idx}">
                        ${s==6?'<textarea class="passage yellow" placeholder="النص الأصفر"></textarea>':''}
                        <input type="text" class="q-txt" placeholder="نص السؤال">
                        ${s==3?'<input type="text" class="opts" placeholder="الخيارات تفصلها فاصلة ,">':''}
                        <input type="text" class="q-ans" placeholder="الإجابة الصحيحة (للتصحيح الذكي)">
                    </div>
                </div>`;
        }
    }

    function updateUI(idx) {
        const t = document.getElementById('type'+idx).value;
        const ui = document.getElementById('ui'+idx);
        let h = ``;
        if(t=="6") h += `<textarea class="passage yellow" placeholder="النص الأصفر"></textarea>`;
        h += `<input type="text" class="q-txt" placeholder="نص السؤال">`;
        if(t=="3") h += `<input type="text" class="opts" placeholder="الخيارات تفصلها فاصلة ,">`;
        h += `<input type="text" class="q-ans" placeholder="الإجابة الصحيحة">`;
        ui.innerHTML = h;
    }

    function generate() {
        const questions = [];
        for(let i=1; i<=42; i++) {
            const r = document.getElementById('row'+i);
            const type = document.getElementById('type'+i).value;
            let obj = {
                type: type,
                q: r.querySelector('.q-text')?.value || r.querySelector('.q-txt').value,
                ans: r.querySelector('.q-ans').value,
                hint: "قاعدة نحوية"
            };
            if(type=="3") obj.opts = r.querySelector('.opts').value.split(',');
            if(type=="5") obj.opts = ["صح", "خطأ"];
            if(type=="6") obj.passage = r.querySelector('.passage').value;
            questions.push(obj);
        }
        const data = btoa(unescape(encodeURIComponent(JSON.stringify({title: document.getElementById('testTitle').value, questions: questions}))));
        document.getElementById('link').value = window.location.href.replace('Admin.html','Student.html') + "?data=" + data;
        document.getElementById('res').style.display = 'block';
    }
</script>
</body>
</html>
