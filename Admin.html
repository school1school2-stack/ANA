<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الاختبارات | ثانوية الأمير عبدالمجيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .main-container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .test-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; color: white; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        
        /* نافذة النتائج */
        #resultsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        tr:nth-child(even) { background: #f9fafb; }
        .edit-input { width: 50px; text-align: center; padding: 5px; border: 2px solid var(--accent); border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>لوحة تحكم الأستاذ عبدالعزيز الفيفي 😇</h2>
</div>

<div class="main-container">
    <div id="testsList">جاري تحميل النماذج...</div>
</div>

<div id="resultsModal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📊 مراجعة واعتماد درجات الطلاب</h3>
        <button onclick="closeResults()" style="background:red" class="btn">إغلاق ×</button>
    </div>
    <table id="resultsTable">
        <thead>
            <tr style="background:var(--primary); color:white;">
                <th>الطالب</th>
                <th>الفصل</th>
                <th>درجة النظام</th>
                <th>الدرجة المعتمدة</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT-10c85ef0c93b79596620fd", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // جلب النماذج
    database.ref('tests').on('value', (s) => {
        const data = s.val();
        const container = document.getElementById('testsList');
        container.innerHTML = '';
        for (let id in data) {
            container.innerHTML += `
                <div class="test-item">
                    <b>${data[id].title}</b>
                    <button class="btn" style="background:orange" onclick="viewResults('${id}')">نتائج الطلاب</button>
                </div>`;
        }
    });

    let currentTestID = '';

    function viewResults(testID) {
        currentTestID = testID;
        document.getElementById('resultsModal').style.display = 'block';
        database.ref('results/' + testID).on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('resultsBody');
            body.innerHTML = '';
            if (!data) return;

            for (let resID in data) {
                const res = data[resID];
                body.innerHTML += `
                    <tr>
                        <td>${res.name}</td>
                        <td>${res.class}</td>
                        <td style="color:blue; font-weight:bold;">${res.score} / ${res.total}</td>
                        <td><input type="number" id="edit_${resID}" value="${res.approvedScore || res.score}" class="edit-input"></td>
                        <td>
                            <button onclick="viewStudentWork('${resID}')" class="btn" style="background:#64748b">👁️ مراجعة</button>
                            <button onclick="approveScore('${resID}')" class="btn" style="background:green">✅ اعتماد</button>
                        </td>
                    </tr>`;
            }
        });
    }

    // مراجعة إجابات الطالب بالتفصيل
    function viewStudentWork(resID) {
        database.ref('results/' + currentTestID + '/' + resID).once('value', (s) => {
            const res = s.val();
            let html = '<div style="text-align:right;">';
            res.details.forEach(d => {
                html += `<p><b>س: ${d.question}</b><br>إجابة الطالب: <span style="color:blue">${d.userAnswer}</span><br>تقييم النظام: ${d.status?'✅':'❌'}</p><hr>`;
            });
            Swal.fire({ title: 'ورقة إجابة الطالب', html: html + '</div>', width: '80%' });
        });
    }

    // اعتماد الدرجة الجديدة وحفظها في السحابة
    function approveScore(resID) {
        const newScore = document.getElementById('edit_' + resID).value;
        database.ref('results/' + currentTestID + '/' + resID).update({
            approvedScore: newScore
        }).then(() => {
            Swal.fire('تم الاعتماد', 'تم تعديل درجة الطالب بنجاح', 'success');
        });
    }

    function closeResults() { document.getElementById('resultsModal').style.display = 'none'; }
</script>
</body>
</html>
