<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; direction: rtl; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-row { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; border-radius: 10px; position: relative; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #cbd5e1; font-family: 'Cairo'; }
        .btn { background: #1e3a8a; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .delete-btn { position: absolute; left: 10px; top: 10px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>🛠️ صانع الاختبارات - أ. عبدالعزيز الفيفي</h2>
    <input type="text" id="testTitle" placeholder="عنوان الاختبار (مثلاً: اختبار النحو الشامل)" style="font-size: 1.2em; border-color: #1e3a8a;">
    <hr>
    <div id="container"></div>
    <button class="btn" onclick="addQ()">➕ إضافة سؤال جديد</button>
    <button class="btn" style="background: #10b981;" onclick="generateLink()">🔗 توليد الرابط النهائي</button>
    
    <div id="result" style="display:none; margin-top:20px; border-top: 2px solid #1e3a8a; padding-top: 15px;">
        <p>انسخ الرابط التالي وأرسله لطلابك:</p>
        <textarea id="outputUrl" style="width:100%; height:80px; font-size: 12px;" readonly></textarea>
        <p style="color: #ef4444; font-size: 12px;">ملاحظة: تأكد من رفع ملف Student.html على الإنترنت ليفتح الرابط عند الطلاب.</p>
    </div>
</div>

<script>
    let qCount = 0;
    function addQ() {
        qCount++;
        const html = `
            <div class="q-row" id="row${qCount}">
                <button class="delete-btn" onclick="document.getElementById('row${qCount}').remove()">×</button>
                <b>سؤال ${qCount}:</b>
                <input type="text" class="q-text" placeholder="نص السؤال">
                <select class="q-type" onchange="toggleOpt(${qCount})">
                    <option value="radio">اختيارات</option>
                    <option value="text">كتابة نصية</option>
                </select>
                <div id="opts${qCount}">
                    <input type="text" class="opt" placeholder="خيار 1">
                    <input type="text" class="opt" placeholder="خيار 2">
                    <input type="text" class="opt" placeholder="خيار 3">
                    <input type="text" class="opt" placeholder="خيار 4">
                </div>
                <input type="text" class="q-ans" placeholder="الإجابة الصحيحة">
                <input type="text" class="q-hint" placeholder="تلميحة مساعدة">
            </div>`;
        document.getElementById('container').insertAdjacentHTML('beforeend', html);
    }
    function toggleOpt(id) { document.getElementById('opts'+id).style.display = (document.querySelector(`#row${id} .q-type`).value === 'radio') ? 'block' : 'none'; }
    function generateLink() {
        const questions = [];
        document.querySelectorAll('.q-row').forEach(row => {
            const type = row.querySelector('.q-type').value;
            const qObj = { q: row.querySelector('.q-text').value, type: type, ans: row.querySelector('.q-ans').value, hint: row.querySelector('.q-hint').value };
            if(type === 'radio') qObj.opts = Array.from(row.querySelectorAll('.opt')).map(i => i.value).filter(v => v !== "");
            questions.push(qObj);
        });
        const fullData = { title: document.getElementById('testTitle').value || "اختبار", questions: questions };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(fullData))));
        // يجب أن يكون ملف Student.html في نفس المجلد
        const baseUrl = window.location.href.replace('Admin.html', 'Student.html');
        document.getElementById('outputUrl').value = baseUrl + "?data=" + encoded;
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
