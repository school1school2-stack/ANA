<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالب | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .q-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-right: 8px solid var(--primary); position: relative; }
        .q-type-badge { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .btn-submit { background: #10b981; color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 25px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Cairo'; margin-top: 15px; box-sizing: border-box; }
        .res-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="testTitle">جاري تحميل الاختبار...</h1>
    <div>أ. عبدالعزيز الفيفي - تصحيح آلي لغوي 😇</div>
</div>

<div class="container">
    <div id="loginSection" class="q-card">
        <h3 style="text-align:center;">بيانات الطالب</h3>
        <input type="text" id="stdName" placeholder="الاسم الكامل">
        <input type="text" id="stdClass" placeholder="الصف والفصل">
        <button class="btn-submit" style="background: var(--primary)" onclick="startExam()">ابدأ الاختبار</button>
    </div>
    <div id="quizSection" style="display:none;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT-10c85ef0c93b79596620fd", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const testID = new URLSearchParams(window.location.search).get('id');
    let examData = [];

    if (testID) {
        database.ref('tests/' + testID).once('value', (s) => {
            const d = s.val(); if (d) { examData = d.questions; document.getElementById('testTitle').innerText = d.title; }
        });
    }

    function startExam() {
        if (!document.getElementById('stdName').value) return;
        document.getElementById('loginSection').style.display = 'none';
        const quiz = document.getElementById('quizSection'); quiz.style.display = 'block';
        examData.forEach((item, i) => {
            let html = `<div class="q-card"><b>س${i+1}: ${item.q}</b><input type="text" id="ans${i}" placeholder="أجب هنا..."></div>`;
            quiz.innerHTML += html;
        });
        quiz.innerHTML += `<button class="btn-submit" onclick="finish()">إرسال وتحليل الإجابات ✅</button>`;
    }

    // --- محرك التصحيح اللغوي الذكي (إصدار 2026 المطور) ---
    function smartJudge(q, uAns) {
        if(!uAns || uAns.length < 1) return false;
        const u = uAns.trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/[ًٌٍَُِّ]/g, '');
        const question = q.toLowerCase();

        // 1. سؤال أداة الجزم (لم)
        if (question.includes("اداه جزم تفيد النفي") || question.includes("مجزوم بلم")) {
            return u === "لم" || (u.includes("لم") && u.length < 15);
        }

        // 2. سؤال الإعراب (يذهبون) - التأكد من ذكر "ثبوت النون" و "فعل"
        if (question.includes("اعراب يذهبون") || question.includes("اعرب يذهبون")) {
            return u.includes("فعل") && u.includes("ثبوت النون") && u.includes("مرفوع");
        }

        // 3. سؤال التمثيل (ثبوت النون)
        if (question.includes("ثبوت النون")) {
            return (u.endsWith("ون") || u.endsWith("ان") || u.endsWith("ين") || u.includes("ون ")) && !u.includes("لم") && !u.includes("لن");
        }

        // 4. سؤال الجزم بحذف حرف العلة
        if (question.includes("حذف حرف العله")) {
            return (u.includes("لم") || u.includes("لا")) && !/[يوا]$/.test(u.split(' ')[1]);
        }

        return u.length > 2; // قبول افتراضي للجمل المفيدة
    }

    function finish() {
        let score = 0; let details = [];
        let summaryHtml = `<div style="text-align:right; font-size:14px; direction:rtl;">`;

        examData.forEach((item, i) => {
            let uVal = document.getElementById('ans'+i).value;
            let isCorrect = smartJudge(item.q, uVal);
            
            if (isCorrect) score++;
            summaryHtml += `<div class="res-row"><span>س${i+1}: ${isCorrect?'✅ صحيح':'❌ خطأ'}</span><span>${uVal}</span></div>`;
            details.push({ question: item.q, userAnswer: uVal, status: isCorrect });
        });

        database.ref('results/' + testID).push({
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            score: score, total: examData.length, details: details
        }).then(() => {
            Swal.fire({
                title: `تم التحليل! درجتك: ${score}/${examData.length}`,
                html: `<div style="max-height:300px; overflow-y:auto;">${summaryHtml}</div>`,
                icon: 'success',
                confirmButtonText: 'إغلاق'
            }).then(() => location.reload());
        });
    }
</script>
</body>
</html>
