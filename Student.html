<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الطالب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; margin: 0; direction: rtl; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid #1e3a8a; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #1e3a8a; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="title" style="text-align:center; color:#1e3a8a;">تحميل الاختبار...</h2>
    <div id="loginSection">
        <input type="text" id="stdName" placeholder="الاسم الرباعي">
        <input type="text" id="stdClass" placeholder="الصف والفصل">
        <button class="btn" onclick="startTest()">دخول الاختبار</button>
    </div>
    <div id="quizSection" style="display:none;"></div>
</div>

<script>
    const firebaseConfig = { /* انسخ نفس إعدادات السحابة هنا */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const testID = new URLSearchParams(window.location.search).get('id');
    let questions = [];

    database.ref('tests/' + testID).once('value', (s) => {
        const d = s.val(); if(d) { questions = d.questions; document.getElementById('title').innerText = d.title; }
    });

    function startTest() {
        if(!document.getElementById('stdName').value) return;
        document.getElementById('loginSection').style.display = 'none';
        const quiz = document.getElementById('quizSection'); quiz.style.display = 'block';
        questions.forEach((q, i) => {
            quiz.innerHTML += `<div class="q-box"><b>س${i+1}: ${q.q}</b><input type="text" id="ans${i}" placeholder="أجب هنا..."></div>`;
        });
        quiz.innerHTML += `<button class="btn" onclick="submit()">إرسال الإجابات</button>`;
    }

    function submit() {
        let score = 0;
        questions.forEach((q, i) => {
            let uAns = document.getElementById('ans'+i).value.trim();
            // --- التصحيح الذكي جداً ---
            const clean = (s) => s.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/\s+/g, '').trim();
            if(clean(uAns).includes(clean(q.ans)) && uAns !== "") score++;
        });

        database.ref('results/' + testID).push({
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            score: score, total: questions.length
        }).then(() => {
            Swal.fire('انتهى الاختبار', `درجتك هي: ${score} من ${questions.length}`, 'success').then(() => location.reload());
        });
    }
</script>
</body>
</html>
