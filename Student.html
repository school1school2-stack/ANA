<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية | ثانوية الأمير عبدالمجيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f4f7f6; --success: #10b981; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .q-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; border-right: 8px solid var(--primary); }
        .q-type-badge { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .passage-box { background: #fff9c4; padding: 15px; border-radius: 12px; border: 2px dashed #fbc02d; margin: 15px 0; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Cairo'; margin-top: 15px; box-sizing: border-box; }
        .btn-submit { background: var(--success); color: white; padding: 18px; width: 100%; border: none; border-radius: 15px; font-weight: 900; font-size: 1.3em; cursor: pointer; margin-top: 25px; }
        #timer { position: fixed; top: 15px; left: 15px; background: white; padding: 8px 18px; border-radius: 25px; border: 3px solid var(--primary); font-weight: 900; z-index: 1000; color: var(--primary); }
    </style>
</head>
<body>
<div id="timer">35:00</div>
<div class="header"><h1 id="testTitle">تحميل...</h1><div>أ. عبدالعزيز الفيفي 😇</div></div>
<div class="container">
    <div id="loginSection" class="q-card"><h3 style="text-align:center;">تسجيل دخول الطالب</h3><input type="text" id="stdName" placeholder="الاسم الكامل"><input type="text" id="stdClass" placeholder="الصف والفصل"><button class="btn-submit" style="background: var(--primary)" onclick="startExam()">ابدأ الاختبار</button></div>
    <div id="quizSection" style="display:none;"></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT-10c85ef0c93b79596620fd", authDomain: "youy-apps.firebaseapp.com", databaseURL: "https://youy-apps-default-rtdb.firebaseio.com", projectId: "youy-apps", storageBucket: "youy-apps.firebasestorage.app", messagingSenderId: "690543747528", appId: "1:690543747528:web:10c85ef0c93b79596620fd" };
    firebase.initializeApp(firebaseConfig); const database = firebase.database();
    const testID = new URLSearchParams(window.location.search).get('id'); let examData = []; let timeLeft = 35 * 60;
    if (testID) database.ref('tests/' + testID).once('value', (s) => { const d = s.val(); if(d){ examData = d.questions; document.getElementById('testTitle').innerText = d.title; }});
    function startExam() {
        if(!document.getElementById('stdName').value) return; document.getElementById('loginSection').style.display='none'; document.getElementById('quizSection').style.display='block';
        const typeLabels = ["أكمل الفراغ", "إعراب", "تمثيل", "استخراج", "صح وخطأ", "اختيارات"];
        examData.forEach((item, i) => {
            let html = `<div class="q-card"><div class="q-type-badge">${typeLabels[item.type-1]}</div>`;
            if (item.type == 4 && item.passage) html += `<div class="passage-box">${item.passage}</div>`;
            html += `<b>س${i+1}: ${item.q}</b><input type="text" id="ans${i}" placeholder="أجب هنا..."></div>`;
            document.getElementById('quizSection').innerHTML += html;
        });
        document.getElementById('quizSection').innerHTML += `<button class="btn-submit" onclick="finish()">إرسال ✅</button>`;
        setInterval(() => { let m=Math.floor(timeLeft/60), s=timeLeft%60; document.getElementById('timer').innerText=`${m}:${s<10?'0'+s:s}`; if(timeLeft--<=0) finish(); }, 1000);
    }
    function finish() {
        let score = 0; let details = []; const clean = (s) => s.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/[ًٌٍَُِّ]/g, '').trim();
        examData.forEach((item, i) => {
            let uVal = document.getElementById('ans'+i).value; let u = clean(uVal); let q = item.q.toLowerCase(); let isCorrect = false;
            if (q.includes("لم")) isCorrect = u.includes("لم"); else if (q.includes("لن")) isCorrect = u.includes("لن"); else if (item.ans && u.includes(clean(item.ans))) isCorrect = true;
            if (isCorrect) score++; details.push({ question: item.q, userAnswer: uVal, status: isCorrect });
        });
        database.ref('results/' + testID).push({ name: document.getElementById('stdName').value, class: document.getElementById('stdClass').value, score: score, total: examData.length, details: details }).then(() => {
            Swal.fire('تم الإرسال', `درجتك: ${score}/${examData.length}`, 'success').then(() => location.reload());
        });
    }
</script>
</body>
</html>
