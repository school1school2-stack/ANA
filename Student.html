<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالب | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .q-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-right: 8px solid var(--primary); position: relative; }
        .q-type-badge { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 3px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; margin-top: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { background: #10b981; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-weight: 900; font-size: 1.2em; cursor: pointer; margin-top: 20px; }
        
        #timer { position: fixed; top: 10px; left: 10px; background: white; padding: 5px 15px; border-radius: 20px; border: 2px solid var(--primary); font-weight: bold; z-index: 1000; }
        .loading { text-align: center; padding: 50px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="timer">35:00</div>

<div class="header">
    <h1 id="testTitle">جاري تحميل الاختبار...</h1>
    <div style="font-weight: bold;">ثانوية الأمير عبدالمجيد 😇</div>
</div>

<div class="container">
    <div id="loginSection" class="q-card">
        <h3 style="text-align:center;">يرجى إدخال بياناتك للبدء</h3>
        <input type="text" id="stdName" placeholder="الاسم الكامل">
        <input type="text" id="stdClass" placeholder="الصف والفصل">
        <button class="btn-submit" style="background: var(--primary)" onclick="startExam()">دخول الاختبار</button>
    </div>

    <div id="quizSection" style="display:none;"></div>
</div>

<script>
    // بيانات Firebase الخاصة بمشروعك Youy-apps
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT-10c85ef0c93b79596620fd", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const testID = urlParams.get('id');
    let examData = [];
    let timeLeft = 35 * 60;

    // جلب الأسئلة فوراً عند تحميل الصفحة
    if (testID) {
        database.ref('tests/' + testID).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                examData = data.questions;
                document.getElementById('testTitle').innerText = data.title;
            } else {
                Swal.fire('خطأ', 'رابط الاختبار غير صحيح أو النموذج محذوف', 'error');
            }
        });
    }

    function startExam() {
        const name = document.getElementById('stdName').value;
        const cls = document.getElementById('stdClass').value;
        
        if (!name || !cls) return Swal.fire('تنبيه', 'أدخل اسمك وفصلك أولاً', 'warning');
        if (examData.length === 0) return Swal.fire('انتظر', 'جاري تحميل الأسئلة من السحابة...', 'info');

        document.getElementById('loginSection').style.display = 'none';
        const quiz = document.getElementById('quizSection');
        quiz.style.display = 'block';
        
        // بناء الأسئلة ببساطة لضمان عدم التعطل
        examData.forEach((item, i) => {
            let html = `
                <div class="q-card">
                    <b>السؤال ${i+1}: ${item.q}</b>
                    <input type="text" id="ans${i}" placeholder="اكتب إجابتك هنا...">
                </div>`;
            quiz.innerHTML += html;
        });

        quiz.innerHTML += `<button class="btn-submit" onclick="submitExam()">إرسال الإجابات ✅</button>`;
        
        // تشغيل المؤقت
        setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft-- <= 0) submitExam();
        }, 1000);
    }

    function submitExam() {
        let details = [];
        
        // جمع إجابات الطالب
        examData.forEach((item, i) => {
            const val = document.getElementById('ans'+i).value;
            details.push({
                question: item.q,
                userAnswer: val,
                status: false // سيتم تحديده لاحقاً بواسطة المعلم
            });
        });

        // إرسال النتيجة للسحابة
        database.ref('results/' + testID).push({
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            score: 0, // قيمة افتراضية حتى يعتمدها المعلم
            total: examData.length,
            details: details,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            Swal.fire({
                title: 'تم الإرسال بنجاح ✅',
                text: 'شكراً لك، سيقوم المعلم بمراجعة إجابتك واعتماد درجتك قريباً.',
                icon: 'success',
                confirmButtonText: 'إغلاق'
            }).then(() => {
                location.reload();
            });
        }).catch(err => {
            Swal.fire('خطأ', 'تعذر إرسال الإجابات، تحقق من اتصالك', 'error');
        });
    }
</script>
</body>
</html>
