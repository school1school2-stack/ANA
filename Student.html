<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f0f4f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .q-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; border-right: 6px solid var(--primary); }
        
        /* مربع نوع السؤال الصغير */
        .q-type-badge { position: absolute; top: -12px; left: 20px; background: var(--accent); color: white; padding: 2px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .passage-box { background: #fff9c4; padding: 15px; border-radius: 10px; border: 2px dashed #fbc02d; margin-bottom: 15px; font-weight: bold; line-height: 1.8; }
        
        /* تنسيق الخيارات أ ب ج د */
        .opt-container { display: flex; align-items: center; margin: 10px 0; cursor: pointer; background: #f8fafc; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .opt-container:hover { background: #e2e8f0; }
        .opt-symbol { width: 30px; height: 30px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-left: 15px; font-weight: bold; }
        
        /* تنسيق صح وخطأ */
        .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .tf-btn { padding: 15px; border: 2px solid #ddd; border-radius: 12px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tf-btn input { display: none; }
        .tf-btn:has(input:checked) { background: var(--primary); color: white; border-color: var(--primary); }

        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Cairo'; margin-top: 10px; }
        .btn-submit { background: #10b981; color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; font-weight: 900; font-size: 1.2em; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="testTitle">تحميل الاختبار...</h1>
    <div style="font-weight: bold;">أ. عبدالعزيز الفيفي 😇</div>
</div>

<div class="container">
    <div id="loginSection" class="q-card">
        <h3 style="text-align:center;">بيانات الطالب</h3>
        <input type="text" id="stdName" placeholder="الاسم الكامل">
        <input type="text" id="stdClass" placeholder="الصف والفصل">
        <button class="btn-submit" style="background: var(--primary)" onclick="startExam()">دخول الاختبار</button>
    </div>
    <div id="quizSection" style="display:none;"></div>
</div>

<script>
    const firebaseConfig = { /* بيانات السحابة الخاصة بك هنا */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const testID = new URLSearchParams(window.location.search).get('id');
    let examData = [];

    database.ref('tests/' + testID).once('value', (s) => {
        const d = s.val(); if(d) { examData = d.questions; document.getElementById('testTitle').innerText = d.title; }
    });

    function startExam() {
        if(!document.getElementById('stdName').value) return;
        document.getElementById('loginSection').style.display = 'none';
        const quiz = document.getElementById('quizSection');
        quiz.style.display = 'block';
        
        const typeLabels = ["أكمل الفراغ", "إعراب", "تمثيل", "استخراج", "صح وخطأ", "اختيار من متعدد"];
        const symbols = ["أ", "ب", "ج", "د"];

        examData.forEach((item, i) => {
            let html = `<div class="q-card">
                <div class="q-type-badge">${typeLabels[item.type-1]}</div>`;
            
            // 1. إظهار النص في الاستخراج (نوع 4)
            if(item.type == 4 && item.passage) {
                html += `<div class="passage-box">${item.passage}</div>`;
            }

            html += `<b>س${i+1}: ${item.q}</b>`;

            // 2. خيارات أ ب ج د (نوع 6)
            if(item.type == 6) {
                item.opts.forEach((opt, idx) => {
                    html += `
                    <label class="opt-container">
                        <input type="radio" name="q${i}" value="${opt}" style="display:none">
                        <div class="opt-symbol">${symbols[idx]}</div>
                        <span>${opt}</span>
                    </label>`;
                });
            } 
            // 3. أيقونات صح وخطأ (نوع 5)
            else if(item.type == 5) {
                html += `<div class="tf-grid">
                    <label class="tf-btn"><input type="radio" name="q${i}" value="صح"> ✅ صح</label>
                    <label class="tf-btn"><input type="radio" name="q${i}" value="خطأ"> ❌ خطأ</label>
                </div>`;
            } else {
                html += `<input type="text" id="ans${i}" placeholder="اكتب إجابتك هنا...">`;
            }
            quiz.innerHTML += html + `</div>`;
        });
        quiz.innerHTML += `<button class="btn-submit" onclick="submit()">إرسال الإجابات ✅</button>`;
    }

    function submit() {
        let score = 0;
        let details = [];
        const clean = (s) => s.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/\s+/g, ' ').trim();

        examData.forEach((item, i) => {
            let uAns = (item.type == 6 || item.type == 5) ? 
                (document.querySelector(`input[name="q${i}"]:checked`)?.value || "") : 
                document.getElementById('ans'+i).value;
            
            let isCorrect = false;
            let studentVal = clean(uAns);
            let correctVal = clean(item.ans);

            // 5. التصحيح النحوي الذكي جداً
            if (item.q.includes("مجزوم بلم")) {
                // يجب أن تحتوي الإجابة على "لم" ولا تحتوي على "لن"
                if (studentVal.includes("لم") && !studentVal.includes("لن")) isCorrect = true;
            } 
            else if (item.q.includes("منصوب بلن")) {
                if (studentVal.includes("لن") && !studentVal.includes("لم")) isCorrect = true;
            }
            else if (item.type == 6 || item.type == 5) {
                if (uAns === item.ans) isCorrect = true;
            }
            else {
                // للأسئلة المقالية: يجب أن تحتوي إجابة الطالب على الكلمة المفتاحية
                if (correctVal !== "" && studentVal.includes(correctVal)) isCorrect = true;
            }

            if(isCorrect) score++;
            details.push({ question: item.q, userAnswer: uAns, status: isCorrect });
        });

        database.ref('results/' + testID).push({
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            score: score, total: examData.length, details: details
        }).then(() => {
            Swal.fire('تم الإرسال', `درجتك هي ${score} من ${examData.length}`, 'success').then(() => location.reload());
        });
    }
</script>
</body>
</html>
