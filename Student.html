<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطالب | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #3b82f6; }
        .container { max-width: 700px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.1em; }
        #timer { position: fixed; top: 10px; left: 10px; background: white; padding: 5px 15px; border-radius: 50px; border: 2px solid var(--primary); font-weight: 900; }
        .summary-item { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div id="timer">35:00</div>

<div class="header">
    <h1 id="testTitle">جاري تحميل الاختبار...</h1>
    <p>ثانوية الأمير عبدالمجيد 😇</p>
</div>

<div class="container">
    <div id="loginSection" class="card">
        <h3 style="text-align:center;">بيانات الطالب</h3>
        <input type="text" id="stdName" placeholder="الاسم الكامل">
        <input type="text" id="stdClass" placeholder="الصف والفصل">
        <button class="btn" onclick="startExam()" style="margin-top:20px;">دخول الاختبار</button>
    </div>

    <div id="quizSection" style="display:none;"></div>
</div>

<script>
    // إعدادات الفايربيس (تأكد أنها مطابقة تماماً لمشروعك)
    const firebaseConfig = {
        apiKey: "AIzaSyAVRIim7aXjg0hGrMk0qVrXT...", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.firebasestorage.app",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const testID = urlParams.get('id');
    let examData = [];
    let timeLeft = 35 * 60;

    // جلب الأسئلة
    if (testID) {
        database.ref('tests/' + testID).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                examData = data.questions;
                document.getElementById('testTitle').innerText = data.title;
            }
        });
    }

    // منع الإعادة
    if (localStorage.getItem('done_' + testID)) {
        document.body.innerHTML = `<div style="text-align:center; padding-top:100px;"><h1>🛑 عذراً!</h1><p>لقد أديت هذا الاختبار مسبقاً.</p></div>`;
    }

    function startExam() {
        if (!document.getElementById('stdName').value || !document.getElementById('stdClass').value) {
            return Swal.fire('تنبيه', 'أدخل بياناتك كاملة', 'warning');
        }
        document.getElementById('loginSection').style.display = 'none';
        const quiz = document.getElementById('quizSection');
        quiz.style.display = 'block';

        examData.forEach((item, i) => {
            let html = `<div class="q-box"><b>س${i+1}: ${item.q}</b>`;
            if (item.type == "6") { // اختيارات
                item.opts.forEach(opt => {
                    html += `<label style="display:block; margin:8px; cursor:pointer;"><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
                });
            } else {
                html += `<input type="text" id="ans${i}" placeholder="أجب هنا...">`;
            }
            quiz.innerHTML += html + `</div>`;
        });

        quiz.innerHTML += `<button class="btn" style="background:#10b981;" onclick="finish()">إرسال الإجابات ✅</button>`;
        
        setInterval(() => {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft-- <= 0) finish();
        }, 1000);
    }

    function finish() {
        let score = 0;
        let details = [];
        let summaryHtml = '<div style="text-align:right;">';

        examData.forEach((item, i) => {
            let uVal = item.type == "6" ? (document.querySelector(`input[name="q${i}"]:checked`)?.value || "لم يحل") : document.getElementById('ans'+i).value.trim();
            const clean = (s) => s.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/\s+/g, ' ').trim();
            
            let isCorrect = false;
            // محرك التصحيح النحوي الذكي
            if (item.q.includes("مجزوم بلم") && uVal.includes("لم") && !uVal.includes("لن")) isCorrect = true;
            else if (clean(uVal).includes(clean(item.ans)) && uVal !== "") isCorrect = true;

            if (isCorrect) score++;

            summaryHtml += `<div class="summary-item"><b>س${i+1}:</b> ${item.q}<br>
                            إجابتك: <span style="color:${isCorrect?'green':'red'}">${uVal}</span><br>
                            النتيجة: ${isCorrect ? '✅ صح' : '❌ خطأ'}</div>`;

            details.push({ question: item.q, userAnswer: uVal, correctAnswer: item.ans, status: isCorrect });
        });

        // إرسال البيانات
        const resultRef = database.ref('results/' + testID).push();
        resultRef.set({
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            score: score,
            total: examData.length,
            details: details,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            localStorage.setItem('done_' + testID, 'true');
            Swal.fire({
                title: `درجتك: ${score} من ${examData.length}`,
                html: `<div style="max-height:300px; overflow-y:auto;">${summaryHtml}</div>`,
                icon: 'success',
                confirmButtonText: 'تم'
            }).then(() => location.reload());
        }).catch(err => Swal.fire('خطأ في الإرسال', 'تأكد من الاتصال', 'error'));
    }
</script>
</body>
</html>
